<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Garapuvu - Analisador de Requests</title>
<style>
:root{--bg:#faf8f0;--card:#fff;--card2:#faf7ea;--ln:#ece4d0;--tx:#26301f;--mut:#6c7360;--pri:#e6a400;--pri2:#c58c00;--grn:#2e8b57;--soft:#fdf4d6;--softbd:#f1dd9c;--ok:#1f8a52;--okbg:#e6f5ec;--dg:#c9403f;--dgbg:#fbeceb;--wn:#a86a12;--wnbg:#fdf4e3;--bl:#2563eb;--blbg:#e8f0fe;--pu:#7c3aed;--code:#1b2016}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5}
.topbar{height:4px;background:linear-gradient(90deg,var(--pri),var(--grn))}
.wrap{max-width:1140px;margin:0 auto;padding:24px 20px 80px}
.brand{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--ln);margin-bottom:22px}
.brand .wm{font-size:21px;font-weight:800;color:var(--tx)}.brand .wm b{color:var(--grn)}
.brand .role{margin-left:auto;font-size:12px;font-weight:600;padding:5px 12px;border-radius:999px;background:var(--soft);color:var(--pri2);border:1px solid var(--softbd)}
h1{font-size:23px;margin:0 0 4px}p.sub{color:var(--mut);margin:0 0 20px;font-size:14px}
.card{background:var(--card);border:1px solid var(--ln);border-radius:16px;padding:20px 22px;margin:14px 0;box-shadow:0 8px 24px -18px rgba(38,48,31,.18)}
label{display:block;font-size:13px;color:var(--mut);margin:12px 0 6px}
input[type=file],input[type=password],input.search,select{padding:10px 12px;background:var(--card2);border:1px solid var(--ln);border-radius:10px;color:var(--tx);font-size:14px}
input[type=file],input[type=password]{width:100%}
input[type=file]::file-selector-button{border:1px solid var(--ln);background:#fff;border-radius:8px;padding:6px 12px;margin-right:12px;cursor:pointer;color:var(--tx)}
button{background:var(--pri);border:none;color:#3a2f00;font-weight:700;padding:11px 20px;border-radius:10px;font-size:14px;cursor:pointer;box-shadow:0 8px 20px -8px rgba(230,164,0,.8)}
button.sec{background:#fff;border:1px solid var(--ln);color:var(--tx);box-shadow:none;padding:8px 14px;font-weight:600}
button:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
.msg{padding:11px 15px;border-radius:10px;margin-top:14px;font-size:14px;display:none;font-weight:500}
.msg.ok{display:block;background:var(--okbg);border:1px solid var(--ok);color:#0c6e49}
.msg.err{display:block;background:var(--dgbg);border:1px solid var(--dg);color:#a5302f}
.metagrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px 22px;font-size:13px}
.metagrid .k{color:var(--mut)}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.pill.host{background:var(--soft);color:var(--pri2);border:1px solid var(--softbd)} .pill.full{background:var(--okbg);color:var(--ok)} .pill.snap{background:#f0ece0;color:var(--mut)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--ln);margin:6px 0 0}
.tab{background:none;border:none;box-shadow:none;color:var(--mut);font-weight:600;padding:10px 14px;border-radius:10px 10px 0 0;cursor:pointer;font-size:14px}
.tab.active{color:var(--pri2);background:var(--soft);border:1px solid var(--ln);border-bottom:2px solid var(--pri)}
.tab .n{font-size:11px;background:#f0ece0;color:var(--mut);border-radius:999px;padding:1px 7px;margin-left:6px}
.pane{display:none;padding-top:16px}.pane.active{display:block}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.chip{font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;border:1px solid var(--ln);background:#fff;color:var(--mut);cursor:pointer}
.chip.on{background:var(--soft);border-color:var(--softbd);color:var(--pri2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--mut);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--ln)}
td{padding:0;border-bottom:1px solid var(--ln);vertical-align:top}
.req-row{cursor:pointer}.req-row:hover{background:var(--card2)}
.req-row>td{padding:9px 10px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.method{font-weight:700;font-size:12px}
.st{font-weight:700;font-size:12px;padding:2px 8px;border-radius:6px}
.st.s2{background:var(--okbg);color:var(--ok)}.st.s3{background:var(--blbg);color:var(--bl)}.st.s4{background:var(--wnbg);color:var(--wn)}.st.s5{background:var(--dgbg);color:var(--dg)}.st.s0{background:#f0ece0;color:var(--mut)}
.hostcell{color:var(--pri2);font-size:12px}
.url{word-break:break-all}
.detail{background:var(--card2);padding:0 14px}
.detail .box{margin:12px 0}
.detail h4{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)}
pre{background:var(--code);border:1px solid #2a3120;border-radius:10px;padding:12px;overflow:auto;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;color:#e9e2c9;max-height:340px;white-space:pre-wrap;word-break:break-word;margin:0}
.kv{font-size:12.5px}.kv div{padding:3px 0;border-bottom:1px dashed var(--ln)}.kv .kk{color:var(--pri2);font-weight:600;margin-right:6px}
.logline{display:flex;gap:10px;padding:7px 10px;border-bottom:1px solid var(--ln);font-size:12.5px;align-items:flex-start}
.logline .lv{flex:none;font-size:10px;font-weight:800;text-transform:uppercase;padding:2px 7px;border-radius:6px;min-width:66px;text-align:center}
.lv.error,.lv.resource-error{background:var(--dgbg);color:var(--dg)} .lv.warn,.lv.warning{background:var(--wnbg);color:var(--wn)} .lv.info{background:var(--blbg);color:var(--bl)} .lv.log,.lv.debug{background:#f0ece0;color:var(--mut)} .lv.unhandledrejection{background:#f1e9fe;color:var(--pu)}
.logline .lt{color:var(--mut);flex:none;font-size:11px}
.logline .lm{white-space:pre-wrap;word-break:break-word;flex:1}
.empty{color:var(--mut);font-size:13.5px;padding:16px;background:var(--card2);border-radius:10px;text-align:center}
.small{font-size:12px;color:var(--mut)}
.tokbtn{font-size:11px;padding:2px 8px;margin-left:8px}
code{background:#f2ecdd;padding:1px 6px;border-radius:6px;font-size:12px;color:#8a5a00}

.secsummary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.sevpill{font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;border:1px solid var(--ln)}
.sevpill.critico{background:#fbe3e3;color:#b02020;border-color:#f0b8b8}
.sevpill.alto{background:#fdecdf;color:#b5510f;border-color:#f3cfae}
.sevpill.medio{background:var(--wnbg);color:var(--wn);border-color:#eecfa0}
.sevpill.baixo{background:var(--blbg);color:var(--bl);border-color:#c3d6fb}
.sevpill.info{background:#f0ece0;color:var(--mut)}
.credbox{border-radius:14px;padding:16px 18px;margin-bottom:16px;border:1px solid}
.credbox.bad{background:#fbe3e3;border-color:#f0b8b8}
.credbox.good{background:var(--okbg);border-color:#bfe6cf}
.findlist{display:flex;flex-direction:column;gap:10px}
.finding{border:1px solid var(--ln);border-left-width:4px;border-radius:12px;padding:12px 14px;background:var(--card)}
.finding.critico{border-left-color:#b02020}.finding.alto{border-left-color:#b5510f}.finding.medio{border-left-color:var(--wn)}.finding.baixo{border-left-color:var(--bl)}.finding.info{border-left-color:var(--mut)}
.fh{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.sev{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px}
.sev.critico{background:#fbe3e3;color:#b02020}.sev.alto{background:#fdecdf;color:#b5510f}.sev.medio{background:var(--wnbg);color:var(--wn)}.sev.baixo{background:var(--blbg);color:var(--bl)}.sev.info{background:#f0ece0;color:var(--mut)}
.fd{font-size:12px;background:var(--card2);padding:6px 8px;border-radius:8px;margin:4px 0;word-break:break-all;font-family:ui-monospace,Menlo,Consolas,monospace}
.frec{font-size:12.5px;color:var(--grn);margin-top:4px}

.scanpanel{background:var(--card2);border:1px solid var(--ln);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.scanhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:12px;flex-wrap:wrap}
.importrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:10px 0}
.imp{display:inline-block;background:var(--pri);color:#3a2f00;font-weight:700;padding:9px 16px;border-radius:10px;cursor:pointer;font-size:13px}
.imp:hover{filter:brightness(.97)}
.scorewrap{display:flex;gap:18px;flex-wrap:wrap}
.scorecard{text-align:center}
.ring{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;border:5px solid var(--c);color:var(--tx);font-weight:800;font-size:18px}
</style></head><body>
<div class="topbar"></div><div class="wrap">
<div class="brand"><svg width="27" height="27" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="6" fill="#e6a400"/><circle cx="12" cy="9" r="2.3" fill="#c58c00"/><path d="M12 9 L12 22" stroke="#2e8b57" stroke-width="2.4" stroke-linecap="round"/><path d="M12 16 C8.5 15 6.5 17 6.5 19.5 C10 19.5 12 18 12 16Z" fill="#2e8b57"/><path d="M12 14 C15.5 13 17.5 15 17.5 17.5 C14 17.5 12 16 12 14Z" fill="#3ba86a"/></svg><span class="wm">Gara<b>puvu</b></span><span class="role">Analisador de Requests</span></div>
<h1>Analisador de requests</h1>
<p class="sub">Abra o <code>garapuvu-sessao-*.json</code>, informe a chave e explore requisicoes (de qualquer dominio), console, cookies e storage.</p>

<div class="card" id="loader">
  <label>1. Arquivo da sessao (.json)</label>
  <input type="file" id="file" accept=".json,application/json">
  <label>2. Chave do time</label>
  <input type="password" id="key" placeholder="chave secreta do time (TEAM_KEY)" autocomplete="off">
  <div class="row"><button id="go" disabled>Analisar</button><button id="dl" class="sec" style="display:none">Baixar JSON decifrado</button></div>
  <div class="msg" id="msg"></div>
</div>

<div class="card" id="metaCard" style="display:none"><div class="metagrid" id="meta"></div></div>
<div class="card" id="viewer" style="display:none"><div class="tabs" id="tabs"></div><div id="panes"></div></div>

<script>
var $=function(id){return document.getElementById(id);};
var fileInput=$('file'),keyInput=$('key'),go=$('go'),dl=$('dl'),msg=$('msg');
var loaded=null,decoded=null;
function setMsg(t,cls){msg.textContent=t;msg.className='msg '+cls;}
function toggleGo(){go.disabled=!(loaded&&keyInput.value);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fromB64(str){var bin=atob(str);var u8=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);return u8;}
function pretty(v){if(v==null)return '';var s=String(v);try{return JSON.stringify(JSON.parse(s),null,2);}catch(e){return s;}}
function hostOf(u){try{return new URL(u).host;}catch(e){return '';}}
function pathOf(u){try{var x=new URL(u);return x.pathname+(x.search?x.search:'');}catch(e){return u;}}

fileInput.addEventListener('change',function(){var f=fileInput.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{loaded=JSON.parse(r.result);setMsg('Arquivo carregado. Informe a chave e clique em Analisar.','ok');}catch(e){loaded=null;setMsg('Arquivo invalido (nao e JSON).','err');}toggleGo();};r.readAsText(f);});
keyInput.addEventListener('input',toggleGo);

go.addEventListener('click',async function(){
  if(!loaded||!loaded.encrypted){setMsg('Arquivo sem bloco criptografado.','err');return;}
  var e=loaded.encrypted;
  try{
    var enc=new TextEncoder(),dec=new TextDecoder();
    var base=await crypto.subtle.importKey('raw',enc.encode(keyInput.value),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:fromB64(e.salt),iterations:e.iter||150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(e.iv)},key,fromB64(e.data));
    var sensitive=JSON.parse(dec.decode(pt));
    decoded={meta:loaded.meta||{},networkSummary:loaded.networkSummary||[],sensitive:sensitive};
    setMsg('Descriptografado com sucesso.','ok');dl.style.display='inline-block';render();
  }catch(err){setMsg('Falha ao descriptografar. Chave incorreta ou arquivo corrompido.','err');$('viewer').style.display='none';$('metaCard').style.display='none';}
});
dl.addEventListener('click',function(){if(!decoded)return;var blob=new Blob([JSON.stringify(decoded,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='garapuvu-sessao-DECIFRADA.json';document.body.appendChild(a);a.click();a.remove();});

function stClass(st){if(!st)return 's0';var n=Math.floor(st/100);return 's'+(n>=2&&n<=5?n:'0');}

function render(){
  var m=decoded.meta||{};
  var modeP=/completo/i.test(m.mode||'')?'<span class="pill full">completo</span>':'<span class="pill snap">snapshot</span>';
  var mg='';
  mg+='<div><span class="k">Host principal:</span> <span class="pill host">'+esc(m.host||'?')+'</span></div>';
  mg+='<div><span class="k">Modo de captura:</span> '+modeP+'</div>';
  mg+='<div><span class="k">Capturado em:</span> <b>'+esc(m.capturedAt||'')+'</b></div>';
  mg+='<div><span class="k">Consentimento:</span> <b>'+esc(m.consent)+'</b></div>';
  mg+='<div style="grid-column:1/-1"><span class="k">URL:</span> <b class="mono">'+esc(m.url||'')+'</b></div>';
  mg+='<div style="grid-column:1/-1"><span class="k">User-Agent:</span> <span class="small">'+esc(m.userAgent||'')+'</span></div>';
  $('meta').innerHTML=mg;$('metaCard').style.display='block';

  var s=decoded.sensitive||{};
  var net=(s.network&&s.network.length)?s.network:null;
  var fb=(!net&&decoded.networkSummary&&decoded.networkSummary.length)?decoded.networkSummary:null;
  var netCount=net?net.length:(fb?fb.length:0);
  var con=Array.isArray(s.console)?s.console:null;
  var cookies=parseCookies(s.cookies);
  var ls=(s.localStorage&&typeof s.localStorage==='object')?s.localStorage:{};
  var ss=(s.sessionStorage&&typeof s.sessionStorage==='object')?s.sessionStorage:{};
  var cache=Array.isArray(s.cacheStorage)?s.cacheStorage:[];
  var cacheCount=cache.reduce(function(a,c){return a+((c.urls&&c.urls.length)||0);},0);

  var audit=securityAudit(s,m,net,cookies,ls,ss);
  var tabsDef=[['sec','Seguranca',audit.findings.length],['perf','Performance',0],['req','Requisicoes',netCount],['con','Console',con?con.length:0],['cook','Cookies',cookies.length],['ls','localStorage',Object.keys(ls).length],['ss','sessionStorage',Object.keys(ss).length],['cache','Cache',cacheCount]];
  var th='';for(var i=0;i<tabsDef.length;i++){th+='<button class="tab'+(i===0?' active':'')+'" data-p="'+tabsDef[i][0]+'">'+tabsDef[i][1]+'<span class="n">'+tabsDef[i][2]+'</span></button>';}
  $('tabs').innerHTML=th;
  var panes='';tabsDef.forEach(function(t,i){panes+='<div class="pane'+(i===0?' active':'')+'" id="pane-'+t[0]+'"></div>';});
  $('panes').innerHTML=panes;$('viewer').style.display='block';

  renderReq(net,fb,m.host);
  renderConsole(con,s.console);
  renderCookies(cookies);
  renderStorage('pane-ls',ls);
  renderStorage('pane-ss',ss);
  renderCache(cache);
  renderSecurity(audit);
  renderPerf();
  document.querySelectorAll('.tab').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});document.querySelectorAll('.pane').forEach(function(x){x.classList.remove('active');});b.classList.add('active');$('pane-'+b.dataset.p).classList.add('active');});});
}

function renderReq(net,fb,mainHost){
  var host=$('pane-req');
  if(!net&&!fb){host.innerHTML='<div class="empty">Nenhuma requisicao capturada.</div>';return;}
  var isFull=!!net;
  var list=(net||fb).map(function(r){return {rec:isFull?r:null,method:isFull?(r.method||''):((r.type||'').toUpperCase()),status:isFull?r.status:null,url:r.url,host:r.host||hostOf(r.url),dur:r.durationMs,err:r.error};});
  // domain facet
  var counts={};list.forEach(function(it){var h=it.host||'(relativo)';counts[h]=(counts[h]||0)+1;});
  var hosts=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];});
  var opts='<option value="">Todos os dominios ('+list.length+')</option>';
  hosts.forEach(function(h){opts+='<option value="'+esc(h)+'"'+(h===mainHost?' selected':'')+'>'+esc(h)+' ('+counts[h]+')</option>';});
  var note=isFull?'':'<div class="empty" style="margin-bottom:12px">Modo <b>snapshot</b>: sem status/body/headers. Para detalhes, capture com o <b>INICIAR</b>.</div>';
  host.innerHTML=note+'<div class="toolbar"><select id="reqDomain">'+opts+'</select><input class="search" id="reqSearch" placeholder="filtrar por URL, metodo ou status..." style="flex:1;min-width:240px"><span class="small" id="reqCount"></span></div><table><thead><tr><th>Metodo</th><th>Status</th><th>Dominio</th><th>Endpoint</th><th>Duracao</th></tr></thead><tbody id="reqBody"></tbody></table>';
  var body=$('reqBody');
  function draw(){
    var f=($('reqSearch').value||'').toLowerCase().trim();var dom=$('reqDomain').value;
    body.innerHTML='';var shown=0;
    list.forEach(function(it){
      if(dom&&it.host!==dom)return;
      var hay=((it.method||'')+' '+(it.status||'')+' '+(it.url||'')).toLowerCase();
      if(f&&hay.indexOf(f)<0)return;shown++;
      var tr=document.createElement('tr');tr.className='req-row';
      var stTxt=isFull?(it.status||(it.err?'ERR':'-')):'-';
      tr.innerHTML='<td><span class="method">'+esc(it.method)+'</span></td><td><span class="st '+stClass(it.status)+'">'+stTxt+'</span></td><td class="hostcell mono">'+esc(it.host)+'</td><td class="url mono">'+esc(pathOf(it.url))+'</td><td class="small">'+(it.dur!=null?it.dur+' ms':'-')+'</td>';
      body.appendChild(tr);
      if(it.rec){var det=document.createElement('tr');det.style.display='none';var dc=document.createElement('td');dc.colSpan=5;dc.className='detail';dc.innerHTML=reqDetail(it.rec);det.appendChild(dc);tr.addEventListener('click',function(){det.style.display=det.style.display==='none'?'':'none';});body.appendChild(det);}
    });
    $('reqCount').textContent=shown+' de '+list.length;
  }
  draw();
  $('reqSearch').addEventListener('input',draw);
  $('reqDomain').addEventListener('change',draw);
}
function reqDetail(r){
  var h='';
  h+='<div class="box"><h4>URL completa</h4><pre>'+esc(r.url)+'</pre></div>';
  if(r.error)h+='<div class="box"><h4>Erro</h4><pre>'+esc(r.error)+'</pre></div>';
  h+='<div class="box"><h4>Request headers</h4>'+kvBlock(r.reqHeaders)+'</div>';
  if(r.reqBody)h+='<div class="box"><h4>Request body</h4><pre>'+esc(pretty(r.reqBody))+'</pre></div>';
  h+='<div class="box"><h4>Response headers</h4>'+kvBlock(r.respHeaders)+'</div>';
  h+='<div class="box"><h4>Response body</h4><pre>'+(r.respBody?esc(pretty(r.respBody)):'<span class="small">(vazio)</span>')+'</pre></div>';
  return h;
}
function kvBlock(o){if(!o||typeof o!=='object'||!Object.keys(o).length)return '<span class="small">(nenhum)</span>';var h='<div class="kv">';Object.keys(o).forEach(function(k){h+='<div><span class="kk">'+esc(k)+':</span>'+esc(o[k])+'</div>';});return h+'</div>';}

function renderConsole(con,raw){
  var host=$('pane-con');
  if(!con){host.innerHTML='<div class="empty">'+esc(typeof raw==='string'?raw:'Console nao capturado.')+'<br><span class="small">Use o INICIAR no comeco para capturar o console.</span></div>';return;}
  if(!con.length){host.innerHTML='<div class="empty">Nenhuma mensagem de console registrada apos o INICIAR.</div>';return;}
  var levels={};con.forEach(function(l){levels[l.level]=(levels[l.level]||0)+1;});
  var chips='<span class="chip on" data-lv="all">Todos ('+con.length+')</span>';
  Object.keys(levels).forEach(function(lv){chips+='<span class="chip" data-lv="'+esc(lv)+'">'+esc(lv)+' ('+levels[lv]+')</span>';});
  host.innerHTML='<div class="toolbar">'+chips+'</div><div class="toolbar"><input class="search" id="conSearch" placeholder="buscar no console..." style="flex:1;min-width:240px"></div><div id="conList"></div>';
  var cur='all';
  function draw(){var f=($('conSearch').value||'').toLowerCase().trim();var html='';con.forEach(function(l){if(cur!=='all'&&l.level!==cur)return;var text=(l.msg||[]).join(' ');if(f&&text.toLowerCase().indexOf(f)<0)return;var tt=(l.t||'').slice(11,23);html+='<div class="logline"><span class="lv '+esc(l.level)+'">'+esc(l.level)+'</span><span class="lt">'+esc(tt)+'</span><span class="lm">'+esc(text)+'</span></div>';});$('conList').innerHTML=html||'<div class="empty">Nada encontrado.</div>';}
  draw();$('conSearch').addEventListener('input',draw);

function parseLighthouseHtml(html){try{var doc=new DOMParser().parseFromString(html,'text/html');var scores={};var categories=['performance','accessibility','best-practices','seo','pwa'];categories.forEach(function(cat){var el=doc.querySelector('[data-category="'+cat+'"] .score');if(el){var scoreText=(el.textContent||'').replace(/\D/g,'');scores[cat]=parseInt(scoreText)||null;}});var vitals={};var metricsMap={lcp:'Largest Contentful Paint',fcp:'First Contentful Paint',cls:'Cumulative Layout Shift',tbt:'Total Blocking Time',si:'Speed Index',tti:'Time to Interactive'};Object.keys(metricsMap).forEach(function(k){var label=metricsMap[k];var row=Array.from(doc.querySelectorAll('table tr')).find(function(tr){return tr.textContent.indexOf(label)>=0;});if(row){var cells=row.querySelectorAll('td');if(cells.length>=2){var display=cells[1].textContent.trim();vitals[k]={title:label,display:display,score:1};}}});var url=doc.querySelector('meta[name="url"]')||doc.querySelector('[data-final-url]');var urlVal=url?(url.getAttribute('content')||url.getAttribute('data-final-url')):'';return {scores:scores,vitals:vitals,opps:[],url:urlVal};}catch(e){return null;}}
function lhSectionHtml(lh){function col(s){if(s==null)return 'var(--mut)';return s>=90?'#0cce6b':(s>=50?'#ffa400':'#ff4e42');}var names={performance:'Performance',accessibility:'Acessibilidade','best-practices':'Boas praticas',seo:'SEO',pwa:'PWA'};var h='<h3 style="margin:22px 0 8px">Scores Lighthouse</h3><div class="scorewrap">';Object.keys(names).forEach(function(k){var sc=lh.scores[k];h+='<div class="scorecard"><div class="ring" style="--c:'+col(sc)+'"><span>'+(sc==null?'-':sc)+'</span></div><div class="small">'+names[k]+'</div></div>';});h+='</div>';var vn={lcp:'LCP',fcp:'FCP',cls:'CLS',tbt:'TBT',si:'Speed Index',tti:'TTI'};h+='<h3 style="margin:22px 0 8px">Core Web Vitals</h3><table><thead><tr><th>Metrica</th><th>Valor</th></tr></thead><tbody>';Object.keys(vn).forEach(function(k){var v=lh.vitals[k];if(v)h+='<tr><td>'+vn[k]+' - '+esc(v.title||'')+'</td><td><b>'+esc(v.display||'-')+'</b></td></tr>';});h+='</tbody></table>';if(lh.opps.length){h+='<h3 style="margin:22px 0 8px">Principais oportunidades</h3><table><thead><tr><th>Oportunidade</th><th>Economia estimada</th></tr></thead><tbody>';lh.opps.forEach(function(o){h+='<tr><td>'+esc(o.title)+'</td><td>'+esc(o.display||(o.ms+' ms'))+'</td></tr>';});h+='</tbody></table>';}return h;}
function renderPerf(){var host=$('pane-perf');if(!host)return;var meta=(window.decoded&&window.decoded.meta)||{};var main=meta.url||'';if(!main&&window.decoded&&window.decoded.sensitive&&window.decoded.sensitive.network&&window.decoded.sensitive.network[0])main=window.decoded.sensitive.network[0].url||'';var lh=__lh;var h='<div class="scanpanel"><div class="scanhead"><b>Performance (Lighthouse)</b><span class="small">URL principal da 1a interacao</span></div><label>URL a testar</label><div class="importrow"><input class="search" id="perfUrl" value="'+esc(main)+'" style="flex:1;min-width:320px"><button id="perfRun">Rodar no Lighthouse (PageSpeed)</button></div><div class="small">Abre o Lighthouse na nuvem e gera o relatorio completo. Local: <code>npx lighthouse URL --view</code></div><div class="importrow" style="margin-top:12px"><label class="imp">Importar relatorio Lighthouse (.json ou .html)<input type="file" id="lhFile" accept=".json,.html,application/json" style="display:none"></label>'+(lh?'<span class="small">relatorio importado ('+esc(lh.url||'')+')</span>':'<span class="small">nenhum relatorio importado</span>')+'</div></div>';if(lh)h+=lhSectionHtml(lh);else h+='<div class="empty">Rode o Lighthouse (botao acima) e depois importe o JSON ou HTML para ver scores, Core Web Vitals e oportunidades. Ou use o PageSpeed para o relatorio completo online.</div>';host.innerHTML=h;var pr=$('perfRun');if(pr)pr.addEventListener('click',function(){var u=($('perfUrl').value||'').trim();if(!u){alert('Informe a URL.');return;}if(!/^https?:/i.test(u))u='https://'+u;window.open('https://pagespeed.web.dev/analysis?url='+encodeURIComponent(u),'_blank');});var lf=$('lhFile');if(lf)lf.addEventListener('change',function(){var fl=lf.files[0];if(!fl)return;var r=new FileReader();r.onload=function(){try{var content=r.result;var isJson=/^\s*\{/.test(content);if(isJson){__lh=parseLighthouse(JSON.parse(content));}else{__lh=parseLighthouseHtml(content);}if(!__lh){alert('Nao consegui ler o r
