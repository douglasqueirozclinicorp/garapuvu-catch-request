name: SonarCloud

# Analise estatica no SonarCloud a cada push na main e em PRs contra a main.
# Requer os secrets/variaveis configurados no repositorio (ver README):
#   - secret  SONAR_TOKEN            (token gerado no sonarcloud.io)
#   - secret  TEAM_KEY               (chave do time, para o e2e gerar coverage)
#   - variable SONAR_ORGANIZATION    (a organizacao no SonarCloud)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: Análise SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # profundidade completa: necessaria para blame/decoracao de PR do Sonar
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegador (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Cobertura via e2e (gera coverage/lcov.info)
        env:
          TEAM_KEY: ${{ secrets.TEAM_KEY }}
        run: npm run test:coverage

      - name: Relatorio do ESLint (JSON)
        run: |
          mkdir -p .security
          npx eslint . -f json -o .security/eslint-report.json || true

      - name: Instalar gitleaks e gerar SARIF
        run: |
          GL_VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --report-format sarif \
            --report-path .security/gitleaks.sarif || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
