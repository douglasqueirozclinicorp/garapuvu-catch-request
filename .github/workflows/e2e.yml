name: E2E (Playwright)

# Roda a suite e2e a cada push na main (inclui merges de PR aprovados)
# e tambem em PRs abertos contra a main, para pegar problemas antes do merge.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'fixtures/**'
      - 'package.json'
      - 'playwright.config.js'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'fixtures/**'
      - 'package.json'
      - 'playwright.config.js'
  workflow_dispatch:

jobs:
  e2e:
    name: Testes e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (servidor estatico do webServer)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores do Playwright
        run: npx playwright install --with-deps

      - name: Verificar TEAM_KEY
        run: |
          if [ -z "${TEAM_KEY}" ]; then
            echo "::error::Secret TEAM_KEY nao configurado. Adicione em Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          TEAM_KEY: ${{ secrets.TEAM_KEY }}

      - name: Rodar testes e2e
        run: npm test
        env:
          CI: true
          TEAM_KEY: ${{ secrets.TEAM_KEY }}

      - name: Publicar relatorio do Playwright (artefato)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: error

      - name: Publicar traces/screenshots de falhas
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Resumo
        if: ${{ !cancelled() }}
        run: |
          echo "### Relatorio do Playwright" >> "$GITHUB_STEP_SUMMARY"
          echo "Baixe o artefato **playwright-report** nesta execucao (aba Summary → Artifacts)," >> "$GITHUB_STEP_SUMMARY"
          echo "descompacte e abra o \`index.html\` — ou rode \`npx playwright show-report caminho/extraido\`." >> "$GITHUB_STEP_SUMMARY"
