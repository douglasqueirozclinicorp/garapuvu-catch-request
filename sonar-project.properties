sonar.projectKey=garapuvu-catch-request
sonar.projectName=Garapuvu Catch Request
sonar.sources=src,tests,docs
# testes-sonar.js e um arquivo-demo (nao usado pela aplicacao); fica fora da
# analise para nao derrubar o Quality Gate com issues/coverage propositais.
sonar.exclusions=node_modules/**,playwright-report/**,test-results/**,fixtures/**,**/*_files/**,coverage/**,src/testes-sonar.js
# Cobertura: LCOV gerado pelo e2e (npm run test:coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Importa achados das ferramentas estaticas externas para o SonarQube
sonar.eslint.reportPaths=.security/eslint-report.json
sonar.sarifReportPaths=.security/gitleaks.sarif
# Nao conta cobertura de testes/configs/scripts (nao sao codigo de producao)
sonar.coverage.exclusions=tests/**,scripts/**,**/*.config.js,eslint.config.js,playwright.config.js
# Servidor: definido via variavel de ambiente ou linha de comando
# sonar.host.url=http://localhost:9000
# sonar.token=  (use SONAR_TOKEN no ambiente, nunca commite o token)
